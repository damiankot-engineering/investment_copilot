<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Investment Copilot</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Silence a known false-positive React key warning emitted by framer-motion v11's
      // internal child wrapping — it does not reflect an actual bug in user code.
      (function () {
        const origError = console.error;
        console.error = function (...args) {
          const first = args[0];
          if (typeof first === 'string' && first.includes('Each child in a list should have a unique "key" prop')) return;
          return origError.apply(console, args);
        };
      })();
    </script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui'],
              mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
              serif: ['Instrument Serif', 'ui-serif', 'Georgia'],
            },
            colors: {
              ink: {
                950: '#070710',
                900: '#0a0a0f',
                850: '#0e0e16',
                800: '#13131d',
                750: '#181826',
                700: '#1f1f2e',
                650: '#272739',
                600: '#2f2f44',
                500: '#3a3a52',
              },
              accent: {
                cyan: '#22d3ee',
                violet: '#a78bfa',
                indigo: '#818cf8',
                green: '#34d399',
                red: '#f87171',
                amber: '#fbbf24',
                blue: '#60a5fa',
              },
            },
            boxShadow: {
              glow: '0 0 40px -8px rgba(167, 139, 250, 0.35)',
              'glow-cyan': '0 0 40px -8px rgba(34, 211, 238, 0.35)',
              soft: '0 1px 0 0 rgba(255,255,255,0.04) inset, 0 0 0 1px rgba(255,255,255,0.04)',
            },
          },
        },
      };
    </script>

    <style>
      :root {
        color-scheme: dark;
      }
      html, body, #root {
        height: 100%;
        background: #07070d;
      }
      body {
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        color: #e5e7ef;
        font-feature-settings: 'cv11', 'ss01', 'ss03';
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow: hidden;
      }
      .num, .nums, [data-num] {
        font-variant-numeric: tabular-nums;
        font-feature-settings: 'tnum' 1, 'cv11' 1;
      }
      .mono {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-variant-numeric: tabular-nums;
      }

      /* Background ambient drift */
      .bg-aurora {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .bg-aurora::before,
      .bg-aurora::after {
        content: '';
        position: absolute;
        width: 70vw;
        height: 70vw;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.35;
        mix-blend-mode: screen;
      }
      .bg-aurora::before {
        background: radial-gradient(circle, #22d3ee 0%, transparent 60%);
        top: -25%;
        left: -15%;
        animation: drift1 22s ease-in-out infinite alternate;
      }
      .bg-aurora::after {
        background: radial-gradient(circle, #a78bfa 0%, transparent 60%);
        bottom: -30%;
        right: -20%;
        animation: drift2 28s ease-in-out infinite alternate;
      }
      @keyframes drift1 {
        0%   { transform: translate(0,0) scale(1); }
        100% { transform: translate(12vw, 8vh) scale(1.15); }
      }
      @keyframes drift2 {
        0%   { transform: translate(0,0) scale(1); }
        100% { transform: translate(-10vw,-6vh) scale(1.1); }
      }

      /* Grain noise overlay */
      .bg-grain::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        opacity: 0.035;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.9'/></svg>");
      }

      /* Glass panel */
      .glass {
        background: linear-gradient(180deg, rgba(28,28,40,0.55) 0%, rgba(16,16,26,0.55) 100%);
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow:
          0 1px 0 0 rgba(255,255,255,0.04) inset,
          0 0 0 1px rgba(255,255,255,0.02),
          0 30px 80px -40px rgba(0,0,0,0.7);
        backdrop-filter: blur(14px);
      }
      .glass-soft {
        background: rgba(255,255,255,0.025);
        border: 1px solid rgba(255,255,255,0.06);
      }

      .gradient-text {
        background: linear-gradient(110deg, #67e8f9 0%, #c4b5fd 55%, #f0abfc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .gradient-border {
        position: relative;
      }
      .gradient-border::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, rgba(34,211,238,0.5), rgba(167,139,250,0.5));
        -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
                mask-composite: exclude;
        pointer-events: none;
      }

      /* Scrollbars */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.08);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); background-clip: padding-box; border: 2px solid transparent; }

      /* Shimmer */
      @keyframes shimmer {
        0% { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      .shimmer {
        background: linear-gradient(90deg,
          rgba(255,255,255,0.02) 0%,
          rgba(255,255,255,0.08) 50%,
          rgba(255,255,255,0.02) 100%);
        background-size: 800px 100%;
        animation: shimmer 1.4s linear infinite;
      }

      /* High-severity pulse */
      @keyframes pulseRed {
        0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.5); }
        50%      { box-shadow: 0 0 0 8px rgba(248,113,113,0); }
      }
      .pulse-red { animation: pulseRed 1.8s ease-out infinite; }

      /* Recharts dark tweaks */
      .recharts-cartesian-grid line { stroke: rgba(255,255,255,0.05); }
      .recharts-cartesian-axis-tick text { fill: rgba(255,255,255,0.45); font-size: 11px; }
      .recharts-tooltip-wrapper:focus { outline: none; }

      /* Markdown */
      .md h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem; color: #fafafa; }
      .md h2 { font-size: 1.05rem; font-weight: 600; margin: 1rem 0 0.4rem; color: #fafafa; letter-spacing: -0.01em; }
      .md h3 { font-size: 0.95rem; font-weight: 600; margin: 0.9rem 0 0.35rem; color: #e7e7ee; }
      .md p { margin: 0.5rem 0; color: rgba(229,231,239,0.8); line-height: 1.6; }
      .md ul { margin: 0.4rem 0 0.6rem 1.1rem; }
      .md ul li { list-style: disc; margin: 0.2rem 0; color: rgba(229,231,239,0.82); line-height: 1.55; }
      .md strong { color: #fafafa; font-weight: 600; }
      .md em { color: #c4b5fd; font-style: italic; }
      .md code { font-family: 'JetBrains Mono', ui-monospace, monospace; background: rgba(255,255,255,0.06); padding: 0.05rem 0.3rem; border-radius: 4px; font-size: 0.85em; }
      .md hr { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 0.9rem 0; }

      /* Focus rings */
      button:focus-visible, [role="button"]:focus-visible, input:focus-visible, textarea:focus-visible {
        outline: 1px solid rgba(167,139,250,0.6);
        outline-offset: 2px;
      }

      /* Number flip */
      .digit-roll { display: inline-block; }
    </style>
  </head>
  <body class="bg-grain">
    <div class="bg-aurora"></div>
    <div id="root" class="relative z-10"></div>

    <!-- React -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

    <!-- Framer Motion (UMD exposes window.Motion) -->
    <script src="https://unpkg.com/framer-motion@11.18.2/dist/framer-motion.js" crossorigin="anonymous"></script>

    <!-- Recharts deps + UMD -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.10.4/umd/Recharts.js" crossorigin="anonymous"></script>

    <!-- App modules -->
    <script type="text/babel" data-presets="react" src="src/icons.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/mockData.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/api.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/primitives.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/sidebar.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/portfolio.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/watchlist.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/backtest.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/rebalance.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/analysis.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/reports.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/companyReport.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/monitoring.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/portfolioSwitcher.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/app.jsx"></script>
  </body>
</html>
